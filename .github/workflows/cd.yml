name: Publish Mod

on:
  push:
    branches:
      - 'main/**'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from branch
        id: version
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH_NAME#main/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Get commit SHA (short)
        id: commit
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Commit SHA: $SHORT_SHA"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish Fabric to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1244140
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          modrinth-id: 2xEpw5CM
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          version: ${{ steps.commit.outputs.sha }}-${{ steps.version.outputs.version }}-fabric
          version-type: release

          game-versions: ${{ steps.version.outputs.version }}

          loaders: |
            fabric

          files: |
            fabric/build/libs/*-REL.jar

          retry-attempts: 2
          retry-delay: 10000

      - name: Publish NeoForge to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1244140
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          modrinth-id: 2xEpw5CM
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          version: ${{ steps.commit.outputs.sha }}-${{ steps.version.outputs.version }}-neoforge
          version-type: release

          game-versions: ${{ steps.version.outputs.version }}

          loaders: |
            neoforge

          files: |
            neoforge/build/libs/*-REL.jar

          retry-attempts: 2
          retry-delay: 10000

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts-${{ steps.version.outputs.version }}
          path: |
            fabric/build/libs/*-REL.jar
            neoforge/build/libs/*-REL.jar